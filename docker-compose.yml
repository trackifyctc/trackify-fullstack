version: '3.8'

services:
  # FastAPI Backend
  backend:
    image: python:3.11
    container_name: trackify-backend
    working_dir: /app
    environment:
      # Gunakan host.docker.internal untuk akses PostgreSQL di host Windows
      DATABASE_URL: postgresql://postgres:trackify123@host.docker.internal:5432/trackify
      SECRET_KEY: super-secret-change-me-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "pip install -r requirements.txt && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # React Frontend (Development mode dengan Vite)
  frontend:
    image: node:20-alpine
    container_name: trackify-frontend
    working_dir: /app
    ports:
      - "3000:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host"
